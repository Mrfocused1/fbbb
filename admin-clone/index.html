<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Content Admin · FBBS Training Academy</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Newsreader:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
<style>
@font-face{font-display:swap;font-family:'FSAlbert Regular';src:url(/assets/fonts/FSAlbert_Regular.otf)}
@font-face{font-display:swap;font-family:'FSAlbert Bold';src:url(/assets/fonts/FSAlbert_Bold.otf)}

:root{
  --ink:#15130f;
  --ink-soft:#4a473f;
  --ink-faint:#8a8578;
  --paper:#faf8f3;
  --card:#ffffff;
  --line:#e7e2d6;
  --line-soft:#f0ece1;
  --teal:#0b3d38;
  --teal-soft:#e5efec;
  --gold:#a3781f;
  --gold-soft:#f7eed9;
  --blue-soft:#e6eef7;
  --blue:#2b5b8a;
  --violet-soft:#f0e9f9;
  --violet:#6b3fa0;
  --green-soft:#e7f4ea;
  --green:#1f7a3d;
  --red-soft:#fbeae8;
  --red:#b3261e;
  --shadow-sm:0 1px 2px rgba(21,19,15,.04), 0 1px 1px rgba(21,19,15,.03);
  --shadow-md:0 6px 20px rgba(21,19,15,.08), 0 1px 3px rgba(21,19,15,.04);
  --shadow-lg:0 20px 45px rgba(21,19,15,.14), 0 4px 12px rgba(21,19,15,.06);
  --radius:16px;
  --radius-sm:10px;
  --sidebar-w:272px;
}

@media (prefers-color-scheme: dark){
  :root{
    --ink:#f3f1ea;
    --ink-soft:#c9c4b6;
    --ink-faint:#847f70;
    --paper:#111009;
    --card:#1b1913;
    --line:#2c291f;
    --line-soft:#242118;
    --teal-soft:#152522;
    --gold-soft:#2a2011;
    --blue-soft:#132430;
    --violet-soft:#241a30;
    --green-soft:#132318;
    --red-soft:#2c1613;
    --shadow-sm:0 1px 2px rgba(0,0,0,.3);
    --shadow-md:0 6px 20px rgba(0,0,0,.4);
    --shadow-lg:0 20px 45px rgba(0,0,0,.55);
  }
}

*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:'Inter', 'FSAlbert Regular', -apple-system, BlinkMacSystemFont, sans-serif;
  color:var(--ink);
  background:var(--paper);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  -webkit-font-smoothing:antialiased;
}
::selection{background:var(--teal);color:#fff}
.serif{font-family:'Newsreader', Georgia, 'Times New Roman', serif}

/* ---------- icons ---------- */
.icon{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;flex-shrink:0;display:block}

/* ---------- top bar ---------- */
.topbar{
  background:var(--teal);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 24px;
  flex-wrap:wrap;
  gap:12px;
  position:sticky;
  top:0;
  z-index:60;
  box-shadow:var(--shadow-md);
}
.topbar__left{display:flex;align-items:center;gap:14px;min-width:0}
.topbar__logo{
  width:38px;height:38px;border-radius:50%;
  background:#FCF9F1;color:var(--teal);
  display:flex;align-items:center;justify-content:center;
  font-family:'Newsreader',Georgia,serif;font-weight:600;font-size:16px;flex-shrink:0;
  box-shadow:0 0 0 3px rgba(255,255,255,.12);
}
.topbar__titles{display:flex;flex-direction:column;line-height:1.15;min-width:0}
.topbar__title{font-size:16px;font-weight:700;letter-spacing:-.01em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar__eyebrow{font-size:11px;color:rgba(255,255,255,.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topbar__badge{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:600;
  background:rgba(255,255,255,.1);
  border:1px solid rgba(255,255,255,.18);
  color:#f4e3b8;
  padding:5px 10px 5px 8px;
  border-radius:20px;
  white-space:nowrap;
}
.topbar__badge .dot{width:6px;height:6px;border-radius:50%;background:#e8b73f;box-shadow:0 0 0 3px rgba(232,183,63,.25)}
.topbar__right{display:flex;align-items:center;gap:10px}
.topbar__link{
  display:inline-flex;align-items:center;gap:7px;
  color:#fff;text-decoration:none;font-size:13px;font-weight:600;
  border:1px solid rgba(255,255,255,.28);
  background:rgba(255,255,255,.04);
  padding:9px 16px;border-radius:24px;
  transition:.18s ease;
  white-space:nowrap;
}
.topbar__link:hover{background:rgba(255,255,255,.16);border-color:rgba(255,255,255,.4)}

/* ---------- layout ---------- */
.layout{display:flex;flex:1;min-height:0}
.sidebar{
  width:var(--sidebar-w);
  flex-shrink:0;
  background:var(--card);
  border-right:1px solid var(--line);
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.sidebar__search{
  padding:16px 16px 10px;
  flex-shrink:0;
}
.sidebar__search-box{
  display:flex;align-items:center;gap:8px;
  border:1px solid var(--line);
  background:var(--paper);
  border-radius:10px;
  padding:9px 12px;
  color:var(--ink-faint);
}
.sidebar__search-box:focus-within{border-color:var(--teal);color:var(--ink)}
.sidebar__search-box input{
  border:none;background:none;outline:none;font:inherit;font-size:13px;color:var(--ink);width:100%;
}
.sidebar__scroll{flex:1;overflow-y:auto;padding:4px 0 16px}
.sidebar__group-title{
  font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;
  color:var(--ink-faint);padding:16px 20px 8px;
}
.sidebar__item{
  display:flex;justify-content:space-between;align-items:center;gap:8px;
  width:calc(100% - 16px);
  margin:1px 8px;
  text-align:left;background:none;border:none;cursor:pointer;
  padding:9px 12px;font-size:13.5px;color:var(--ink-soft);
  font-family:inherit;font-weight:500;
  border-radius:9px;
  transition:.14s ease;
}
.sidebar__item:hover{background:var(--line-soft);color:var(--ink)}
.sidebar__item.active{background:var(--teal);color:#fff;font-weight:600}
.sidebar__count{
  font-size:11px;font-weight:600;color:var(--ink-faint);background:var(--line-soft);
  border-radius:20px;padding:2px 8px;min-width:22px;text-align:center;
}
.sidebar__item.active .sidebar__count{background:rgba(255,255,255,.18);color:#fff}
.sidebar__item--hidden{display:none}

.pagepicker{display:none}

.main{flex:1;min-width:0;overflow-y:auto}
.main__inner{max-width:960px;margin:0 auto;padding:32px 36px 80px}

.main__header{
  display:flex;justify-content:space-between;align-items:flex-start;
  flex-wrap:wrap;gap:16px;margin-bottom:8px;
}
.main__eyebrow{font-size:12px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px}
.main__title{font-size:32px;margin:0;letter-spacing:-.01em;font-weight:600}
.main__subtitle{font-size:14px;color:var(--ink-faint);margin-top:6px}
.main__view-link{
  display:inline-flex;align-items:center;gap:7px;flex-shrink:0;
  font-size:13px;font-weight:600;color:var(--ink);text-decoration:none;
  border:1px solid var(--line);padding:9px 16px;border-radius:24px;
  background:var(--card);transition:.16s ease;
}
.main__view-link:hover{border-color:var(--teal);color:var(--teal);box-shadow:var(--shadow-sm)}

.stat-row{display:flex;gap:10px;flex-wrap:wrap;margin:20px 0 28px}
.stat-pill{
  display:inline-flex;align-items:center;gap:7px;
  font-size:12.5px;font-weight:600;color:var(--ink-soft);
  background:var(--card);border:1px solid var(--line);
  padding:7px 13px;border-radius:20px;
}
.stat-pill .icon{width:14px;height:14px;color:var(--ink-faint)}

.field-search{
  display:flex;align-items:center;gap:9px;
  border:1px solid var(--line);background:var(--card);
  border-radius:12px;padding:11px 14px;margin-bottom:20px;
  box-shadow:var(--shadow-sm);
}
.field-search .icon{color:var(--ink-faint)}
.field-search input{
  border:none;outline:none;background:none;font:inherit;font-size:14px;color:var(--ink);width:100%;
}
.field-search__clear{
  border:none;background:var(--line-soft);color:var(--ink-faint);cursor:pointer;
  width:20px;height:20px;border-radius:50%;display:none;align-items:center;justify-content:center;flex-shrink:0;
}
.field-search__clear .icon{width:11px;height:11px}
.field-search.has-value .field-search__clear{display:flex}

.fields{display:flex;flex-direction:column;gap:14px}

.field-card{
  background:var(--card);
  border:1px solid var(--line);
  border-radius:var(--radius);
  padding:18px 20px;
  box-shadow:var(--shadow-sm);
  transition:box-shadow .18s ease, border-color .18s ease, transform .18s ease;
  animation:card-in .3s ease both;
  border-left:3px solid transparent;
}
.field-card:hover{box-shadow:var(--shadow-md)}
.field-card.is-dirty{border-left-color:var(--gold)}
.field-card.is-hidden{display:none}
@keyframes card-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

.field-card__top{
  display:flex;justify-content:space-between;align-items:center;gap:10px;
  margin-bottom:12px;flex-wrap:wrap;
}
.field-card__label-wrap{display:flex;align-items:center;gap:9px;min-width:0}
.field-card__type-icon{
  width:26px;height:26px;border-radius:8px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.field-card__type-icon .icon{width:14px;height:14px}
.field-card__type-icon.text{background:var(--line-soft);color:var(--ink-faint)}
.field-card__type-icon.image{background:var(--blue-soft);color:var(--blue)}
.field-card__type-icon.video{background:var(--violet-soft);color:var(--violet)}
.field-card__type-icon.email{background:var(--green-soft);color:var(--green)}
.field-card__label{font-size:13.5px;font-weight:600;color:var(--ink);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.field-card__badge{
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  padding:3px 9px;border-radius:20px;background:var(--line-soft);color:var(--ink-faint);
  flex-shrink:0;
}
.field-card__badge.image{background:var(--blue-soft);color:var(--blue)}
.field-card__badge.video{background:var(--violet-soft);color:var(--violet)}
.field-card__badge.email{background:var(--green-soft);color:var(--green)}

textarea.field-input, input.field-input{
  width:100%;
  font-family:inherit;
  font-size:14.5px;
  line-height:1.5;
  padding:11px 13px;
  border:1px solid var(--line);
  border-radius:9px;
  background:var(--paper);
  color:var(--ink);
  resize:vertical;
  transition:.15s ease;
}
textarea.field-input{min-height:68px}
.field-input:focus{outline:none;border-color:var(--teal);background:var(--card);box-shadow:0 0 0 3px var(--teal-soft)}
.field-input::placeholder{color:var(--ink-faint)}

.field-media{display:flex;gap:16px;align-items:stretch;flex-wrap:wrap}
.field-media__preview{
  width:132px;height:100px;border-radius:11px;overflow:hidden;
  background:var(--line-soft);flex-shrink:0;border:1px solid var(--line);
  display:flex;align-items:center;justify-content:center;position:relative;
}
.field-media__preview img{width:100%;height:100%;object-fit:cover}
.field-media__preview .icon{width:22px;height:22px;color:var(--ink-faint)}
.field-media__controls{flex:1;min-width:230px;display:flex;flex-direction:column;gap:9px;justify-content:center}

.dropzone{
  display:flex;align-items:center;justify-content:center;gap:8px;
  border:1.5px dashed var(--line);border-radius:9px;
  padding:12px;font-size:13px;font-weight:600;color:var(--ink-faint);
  cursor:pointer;transition:.15s ease;background:var(--paper);
}
.dropzone:hover, .dropzone.drag-over{border-color:var(--teal);color:var(--teal);background:var(--teal-soft)}
.dropzone input{display:none}
.dropzone .icon{width:16px;height:16px}

.field-card__bottom{
  display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:14px;
  padding-top:12px;border-top:1px solid var(--line-soft);
}
.field-status{font-size:12px;font-weight:500;min-height:16px;display:flex;align-items:center;gap:5px}
.field-status.ok{color:var(--green)}
.field-status.err{color:var(--red)}
.field-status .icon{width:13px;height:13px}

.save-btn{
  display:inline-flex;align-items:center;gap:7px;
  font-family:inherit;font-size:13px;font-weight:700;
  padding:9px 18px;border-radius:20px;border:1px solid transparent;cursor:pointer;
  background:var(--line-soft);color:var(--ink-faint);transition:.16s ease;
}
.save-btn .icon{width:14px;height:14px}
.save-btn.dirty{background:var(--teal);color:#fff;box-shadow:var(--shadow-sm)}
.save-btn.dirty:hover{filter:brightness(1.1)}
.save-btn:disabled{cursor:default}
.save-btn.saving{background:var(--ink-faint);color:#fff}

.loading{padding:60px 0;text-align:center;color:var(--ink-faint);font-size:14px}
.loading__spinner{
  width:26px;height:26px;border-radius:50%;
  border:2.5px solid var(--line);border-top-color:var(--teal);
  margin:0 auto 14px;animation:spin .8s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{padding:60px 20px;text-align:center;color:var(--ink-faint);font-size:14px}
.empty .icon{width:32px;height:32px;margin:0 auto 12px;color:var(--line)}

/* ---------- toasts ---------- */
.toasts{
  position:fixed;bottom:20px;right:20px;z-index:200;
  display:flex;flex-direction:column;gap:10px;align-items:flex-end;
}
.toast{
  display:flex;align-items:center;gap:9px;
  background:var(--ink);color:var(--paper);
  padding:12px 18px;border-radius:12px;font-size:13.5px;font-weight:500;
  box-shadow:var(--shadow-lg);
  animation:toast-in .25s cubic-bezier(.2,.8,.3,1) both;
  max-width:340px;
}
.toast.err{background:var(--red)}
.toast .icon{width:16px;height:16px;flex-shrink:0}
@keyframes toast-in{from{opacity:0;transform:translateY(10px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.toast.leaving{animation:toast-out .2s ease forwards}
@keyframes toast-out{to{opacity:0;transform:translateY(6px) scale(.96)}}

@media (max-width:900px){
  .sidebar{display:none}
  .pagepicker{
    display:block;padding:14px 20px;background:var(--card);border-bottom:1px solid var(--line);
    position:sticky;top:66px;z-index:50;
  }
  .pagepicker__box{
    display:flex;align-items:center;gap:8px;
    border:1px solid var(--line);border-radius:10px;padding:11px 14px;background:var(--paper);
  }
  .pagepicker select{
    flex:1;font-size:14.5px;font-weight:600;border:none;background:none;color:var(--ink);
    font-family:inherit;outline:none;
  }
  .layout{flex-direction:column}
  .main__inner{padding:22px 18px 60px}
  .main__title{font-size:25px}
  .field-media__preview{width:100%;height:150px}
  .field-media{flex-direction:column}
  .topbar{padding:12px 16px}
  .topbar__eyebrow{display:none}
}
</style>
</head>

    {slug:'cpd-masterclasses', label:'CPD Masterclasses', path:'/cpd-masterclasses/'},
    {slug:'one-to-one-training', label:'One-to-One Training', path:'/one-to-one-training/'},
    {slug:'open-days', label:'Open Days', path:'/open-days/'},
    {slug:'student-support', label:'Student Support', path:'/student-support/'},
    {slug:'partners', label:'Partners', path:'/partners/'},
    {slug:'gallery', label:'Gallery', path:'/gallery/'},
    {slug:'news-insights', label:'News & Insights', path:'/news-insights/'},
    {slug:'contact', label:'Contact', path:'/contact/'},
    {slug:'admissions', label:'Admissions', path:'/admissions/'},
    {slug:'booking', label:'Book Online', path:'/booking/'},
    {slug:'privacy-policy', label:'Privacy Policy', path:'/privacy-policy/'},
    {slug:'terms-and-conditions', label:'Terms & Conditions', path:'/terms-and-conditions/'},
    {slug:'cookies-policy', label:'Cookies Policy', path:'/cookies-policy/'},
    {slug:'global', label:'Global / Site-wide', path:'/'}
  ];
  var LEGAL = ['privacy-policy','terms-and-conditions','cookies-policy'];

  var rowsByPage = {};
  var currentSlug = 'home';
  var fieldFilter = '';

  function headers(extra){
    var h = {apikey: SUPABASE_ANON_KEY, Authorization: 'Bearer ' + SUPABASE_ANON_KEY};
    for (var k in extra) h[k] = extra[k];
    return h;
  }

  function fetchAll(){
    return fetch(SUPABASE_URL + '/rest/v1/site_content?select=*&order=page_slug.asc,sort_order.asc', {
      headers: headers()
    }).then(function(r){
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    });
  }

  function groupRows(rows){
    var by = {};
    rows.forEach(function(r){
      (by[r.page_slug] = by[r.page_slug] || []).push(r);
    });
    Object.keys(by).forEach(function(slug){
      var seen = {};
      by[slug].forEach(function(r){ seen[r.label] = (seen[r.label]||0) + 1; });
      var idx = {};
      by[slug].forEach(function(r){
        if (seen[r.label] > 1) {
          idx[r.label] = (idx[r.label]||0) + 1;
          r._displayLabel = r.label + ' (' + idx[r.label] + ')';
        } else {
          r._displayLabel = r.label;
        }
      });
    });
    return by;
  }

  function typeIcon(type){
    if (type === 'image') return 'i-image';
    if (type === 'video') return 'i-video';
    if (type === 'email') return 'i-mail';
    return 'i-type';
  }

  function renderSidebar(searchQuery){
    var sidebar = document.getElementById('sidebar');
    var select = document.getElementById('pagepicker-select');
    sidebar.innerHTML = '';
    select.innerHTML = '';

    var q = (searchQuery || '').toLowerCase().trim();
    var mainPages = PAGES.filter(function(p){ return p.slug !== 'global' && LEGAL.indexOf(p.slug) === -1; });
    var legalPages = PAGES.filter(function(p){ return LEGAL.indexOf(p.slug) !== -1; });
    var globalPage = PAGES.filter(function(p){ return p.slug === 'global'; });

    function group(title, list){
      if (!list.length) return;
      var visible = list.filter(function(p){ return !q || p.label.toLowerCase().indexOf(q) !== -1; });
      if (!visible.length) return;
      var t = document.createElement('div');
      t.className = 'sidebar__group-title';
      t.textContent = title;
      sidebar.appendChild(t);
      visible.forEach(function(p){ sidebar.appendChild(makeItem(p)); });
    }

    function makeItem(p){
      var count = (rowsByPage[p.slug] || []).length;
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'sidebar__item' + (p.slug === currentSlug ? ' active' : '');
      btn.innerHTML = '<span>' + escapeHtml(p.label) + '</span><span class="sidebar__count">' + count + '</span>';
      btn.addEventListener('click', function(){ selectPage(p.slug); });
      return btn;
    }

    group('Site pages', mainPages);
    group('Legal', legalPages);
    group('Shared', globalPage);

    PAGES.forEach(function(p){
      var count = (rowsByPage[p.slug] || []).length;
      var opt = document.createElement('option');
      opt.value = p.slug;
      opt.textContent = p.label + ' (' + count + ')';
      if (p.slug === currentSlug) opt.selected = true;
      select.appendChild(opt);
    });
  }

  function renderStats(rows){
    var counts = {text:0, image:0, video:0, email:0};
    rows.forEach(function(r){ counts[r.field_type] = (counts[r.field_type]||0) + 1; });
    var pills = [];
    if (counts.text) pills.push([ 'i-align', counts.text + ' text' ]);
    if (counts.image) pills.push([ 'i-image', counts.image + ' image' + (counts.image===1?'':'s') ]);
    if (counts.video) pills.push([ 'i-video', counts.video + ' video' + (counts.video===1?'':'s') ]);
    if (counts.email) pills.push([ 'i-mail', counts.email + ' email' ]);
    document.getElementById('stat-row').innerHTML = pills.map(function(p){
      return '<span class="stat-pill"><svg class="icon"><use href="#'+p[0]+'"/></svg>' + p[1] + '</span>';
    }).join('');
  }

  function renderFields(){
    var page = PAGES.filter(function(p){ return p.slug === currentSlug; })[0];
    document.getElementById('page-eyebrow').textContent = currentSlug === 'global' ? 'Shared content' : 'Page';
    document.getElementById('page-title').textContent = page.label;
    document.getElementById('page-subtitle').textContent = currentSlug === 'global'
      ? 'Shown on every page — footer contact details and the site logo.'
      : 'Everything editable on this page, in the order it appears.';
    var viewLink = document.getElementById('view-link');
    if (currentSlug === 'global') {
      viewLink.style.display = 'none';
    } else {
      viewLink.style.display = '';
      viewLink.href = page.path;
    }

    var rows = rowsByPage[currentSlug] || [];
    renderStats(rows);

    var searchWrap = document.getElementById('field-search-wrap');
    searchWrap.style.display = rows.length > 6 ? '' : 'none';

    var container = document.getElementById('fields');
    container.innerHTML = '';

    if (!rows.length) {
      container.innerHTML = '<div class="empty"><svg class="icon"><use href="#i-inbox"/></svg>No editable fields found for this page.</div>';
      return;
    }

    rows.forEach(function(row, i){
      var card = buildFieldCard(row);
      card.style.animationDelay = Math.min(i * 22, 300) + 'ms';
      container.appendChild(card);
    });
    applyFieldFilter();
  }

  function applyFieldFilter(){
    var q = fieldFilter.toLowerCase().trim();
    var cards = document.querySelectorAll('.field-card');
    var visibleCount = 0;
    cards.forEach(function(card){
      var hay = card.getAttribute('data-search') || '';
      var match = !q || hay.indexOf(q) !== -1;
      card.classList.toggle('is-hidden', !match);
      if (match) visibleCount++;
    });
    var container = document.getElementById('fields');
    var existingEmpty = container.querySelector('.empty--filter');
    if (q && visibleCount === 0) {
      if (!existingEmpty) {
        var e = document.createElement('div');
        e.className = 'empty empty--filter';
        e.innerHTML = '<svg class="icon"><use href="#i-search"/></svg>No fields match "' + escapeHtml(fieldFilter) + '".';
        container.appendChild(e);
      }
    } else if (existingEmpty) {
      existingEmpty.remove();
    }
  }

  function showToast(message, isError){
    var toasts = document.getElementById('toasts');
    var t = document.createElement('div');
    t.className = 'toast' + (isError ? ' err' : '');
    t.innerHTML = '<svg class="icon"><use href="#' + (isError ? 'i-alert' : 'i-check-circle') + '"/></svg><span>' + escapeHtml(message) + '</span>';
    toasts.appendChild(t);
    setTimeout(function(){
      t.classList.add('leaving');
      setTimeout(function(){ t.remove(); }, 220);
    }, isError ? 4200 : 2600);
  }

  function buildFieldCard(row){
    var card = document.createElement('div');
    card.className = 'field-card';
    card.setAttribute('data-search', (row._displayLabel + ' ' + row.value + ' ' + row.field_type).toLowerCase());

    var top = document.createElement('div');
    top.className = 'field-card__top';
    var tIcon = typeIcon(row.field_type);
    top.innerHTML =
      '<div class="field-card__label-wrap">' +
        '<div class="field-card__type-icon ' + row.field_type + '"><svg class="icon"><use href="#' + tIcon + '"/></svg></div>' +
        '<span class="field-card__label">' + escapeHtml(row._displayLabel) + '</span>' +
      '</div>' +
      '<span class="field-card__badge ' + row.field_type + '">' + row.field_type + '</span>';
    card.appendChild(top);

    var input;
    var dirty = false;

    function markDirty(){
      if (dirty) return;
      dirty = true;
      card.classList.add('is-dirty');
      saveBtn.classList.add('dirty');
      saveBtn.disabled = false;
    }

    if (row.field_type === 'image' || row.field_type === 'video') {
      var mediaWrap = document.createElement('div');
      mediaWrap.className = 'field-media';

      var preview = document.createElement('div');
      preview.className = 'field-media__preview';
      if (row.field_type === 'image') {
        preview.innerHTML = '<img src="' + escapeAttr(row.value) + '" alt="">';
      } else {
        preview.innerHTML = '<svg class="icon"><use href="#i-video"/></svg>';
      }
      mediaWrap.appendChild(preview);

      var controls = document.createElement('div');
      controls.className = 'field-media__controls';

      input = document.createElement('input');
      input.type = 'text';
      input.className = 'field-input';
      input.value = row.value;
      input.placeholder = row.field_type === 'image' ? 'Image URL' : 'Video URL (mp4 or embed link)';
      controls.appendChild(input);

      var dz = document.createElement('label');
      dz.className = 'dropzone';
      dz.innerHTML = '<svg class="icon"><use href="#i-upload"/></svg><span>Drop ' + row.field_type + ' here or click to upload</span><input type="file" accept="' + (row.field_type === 'image' ? 'image/*' : 'video/*') + '">';
      var fileInput = dz.querySelector('input');
      controls.appendChild(dz);

      ['dragenter','dragover'].forEach(function(evt){
        dz.addEventListener(evt, function(e){ e.preventDefault(); dz.classList.add('drag-over'); });
      });
      ['dragleave','drop'].forEach(function(evt){
        dz.addEventListener(evt, function(e){ e.preventDefault(); dz.classList.remove('drag-over'); });
      });
      dz.addEventListener('drop', function(e){
        var file = e.dataTransfer.files[0];
        if (file) handleUpload(file);
      });

      function handleUpload(file){
        var dzLabel = dz.querySelector('span');
        var originalText = dzLabel.textContent;
        dzLabel.textContent = 'Uploading…';
        var ext = (file.name.split('.').pop() || 'bin').toLowerCase();
        var path = row.page_slug + '/' + row.cms_key + '-' + Date.now() + '.' + ext;
        fetch(SUPABASE_URL + '/storage/v1/object/site-media/' + path, {
          method: 'POST',
          headers: headers({'Content-Type': file.type || 'application/octet-stream'}),
          body: file
        }).then(function(r){
          if (!r.ok) return r.text().then(function(t){ throw new Error(t); });
          return r.json();
        }).then(function(){
          var publicUrl = SUPABASE_URL + '/storage/v1/object/public/site-media/' + path;
          input.value = publicUrl;
          if (row.field_type === 'image') preview.innerHTML = '<img src="' + escapeAttr(publicUrl) + '" alt="">';
          dzLabel.textContent = originalText;
          showToast('Uploaded — click Save to publish');
          markDirty();
        }).catch(function(err){
          dzLabel.textContent = originalText;
          showToast('Upload failed: ' + err.message, true);
        });
      }

      fileInput.addEventListener('change', function(){
        var file = fileInput.files[0];
        if (file) handleUpload(file);
      });

      input.addEventListener('input', function(){
        if (row.field_type === 'image') preview.innerHTML = '<img src="' + escapeAttr(input.value) + '" alt="">';
        markDirty();
      });

      mediaWrap.appendChild(controls);
      card.appendChild(mediaWrap);
    } else {
      input = document.createElement('textarea');
      input.className = 'field-input';
      input.value = row.value;
      input.addEventListener('input', markDirty);
      card.appendChild(input);
    }

    var bottom = document.createElement('div');
    bottom.className = 'field-card__bottom';
    var status = document.createElement('span');
    status.className = 'field-status';
    var saveBtn = document.createElement('button');
    saveBtn.type = 'button';
    saveBtn.className = 'save-btn';
    saveBtn.innerHTML = '<svg class="icon"><use href="#i-check"/></svg><span>Save</span>';
    saveBtn.disabled = true;

    saveBtn.addEventListener('click', function(){
      saveBtn.classList.add('saving');
      saveBtn.disabled = true;
      saveBtn.querySelector('span').textContent = 'Saving…';
      status.textContent = '';
      var newValue = input.value;

      fetch(SUPABASE_URL + '/rest/v1/site_content?page_slug=eq.' + encodeURIComponent(row.page_slug) + '&cms_key=eq.' + encodeURIComponent(row.cms_key), {
        method: 'PATCH',
        headers: headers({'Content-Type': 'application/json', 'Prefer': 'return=minimal'}),
        body: JSON.stringify({value: newValue, updated_at: new Date().toISOString()})
      }).then(function(r){
        if (!r.ok) return r.text().then(function(t){ throw new Error(t); });
        row.value = newValue;
        dirty = false;
        card.classList.remove('is-dirty');
        saveBtn.classList.remove('saving', 'dirty');
        saveBtn.querySelector('span').textContent = 'Save';
        saveBtn.disabled = true;
        showToast('Saved “' + row._displayLabel.slice(0, 40) + '”');
      }).catch(function(err){
        saveBtn.classList.remove('saving');
        saveBtn.classList.add('dirty');
        saveBtn.disabled = false;
        saveBtn.querySelector('span').textContent = 'Save';
        showToast('Save failed: ' + err.message, true);
      });
    });

    bottom.appendChild(status);
    bottom.appendChild(saveBtn);
    card.appendChild(bottom);

    return card;
  }

  function selectPage(slug){
    currentSlug = slug;
    fieldFilter = '';
    document.getElementById('field-search').value = '';
    document.getElementById('field-search-wrap').classList.remove('has-value');
    // Clear sidebar search and force full sidebar refresh
    var sidebarSearch = document.getElementById('sidebar-search');
    sidebarSearch.value = '';
    renderSidebar('');
    renderFields();
    document.querySelector('.main').scrollTo({top:0, behavior:'smooth'});
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function escapeAttr(s){ return escapeHtml(s); }

  document.getElementById('pagepicker-select').addEventListener('change', function(e){
    selectPage(e.target.value);
  });

  document.getElementById('sidebar-search').addEventListener('input', function(e){
    renderSidebar(e.target.value);
  });

  var fieldSearchInput = document.getElementById('field-search');
  fieldSearchInput.addEventListener('input', function(e){
    fieldFilter = e.target.value;
    document.getElementById('field-search-wrap').classList.toggle('has-value', !!fieldFilter);
    applyFieldFilter();
  });
  document.getElementById('field-search-clear').addEventListener('click', function(){
    fieldFilter = '';
    fieldSearchInput.value = '';
    document.getElementById('field-search-wrap').classList.remove('has-value');
    applyFieldFilter();
    fieldSearchInput.focus();
  });

  // Sidebar search clear - also ensure renderSidebar is called
  document.getElementById('sidebar-search').addEventListener('change', function(e){
    renderSidebar(e.target.value);
  });

  fetchAll().then(function(rows){
    rowsByPage = groupRows(rows);
    renderSidebar('');
    renderFields();
  }).catch(function(err){
    document.getElementById('fields').innerHTML = '<div class="empty"><svg class="icon"><use href="#i-alert"/></svg>Failed to load content: ' + escapeHtml(err.message) + '</div>';
  });
})();
</script>
</body>
</html>
